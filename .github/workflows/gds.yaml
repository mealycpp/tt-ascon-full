name: gds

on:
  push:
  workflow_dispatch:

jobs:
  gds:
    runs-on: ubuntu-24.04
    steps:
      - name: checkout repo
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Build GDS
        uses: TinyTapeout/tt-gds-action@ttgf26a
        with:
          pdk: gf180mcuD

  precheck:
    needs: gds
    runs-on: ubuntu-24.04
    steps:

      - name: Upload GDS failure logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gds-debug-logs
          path: |
            runs/wokwi/**/*.log
            runs/wokwi/**/*.json
            runs/wokwi/**/*.def
            runs/wokwi/**/*.sdc
            runs/wokwi/**/*.rpt
            runs/wokwi/**/COMMANDS
            src/config.json
            info.yaml
          if-no-files-found: ignore
      - name: Run Tiny Tapeout Precheck
        uses: TinyTapeout/tt-gds-action/precheck@ttgf26a

  gl_test:
    needs: gds
    runs-on: ubuntu-24.04
    steps:
      - name: checkout repo
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: GL test
        uses: TinyTapeout/tt-gds-action/gl_test@ttgf26a

  viewer:
    needs: gds
    runs-on: ubuntu-24.04
    permissions:
      pages: write      # to deploy to Pages
      id-token: write   # to verify the deployment originates from an appropriate source
    steps:
      - uses: TinyTapeout/tt-gds-action/viewer@ttgf26a
